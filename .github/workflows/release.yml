name: WPF Release (.NET 10)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true

    - name: Restore
      run: dotnet restore

    - name: Publish (Release)
      run: |
        dotnet publish `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o publish

    - name: Zip artifact
      run: |
        Compress-Archive `
          -Path publish\* `
          -DestinationPath WpfApp-${{ github.ref_name }}-net10.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WpfApp-net10
        path: WpfApp-${{ github.ref_name }}-net10.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: WpfApp-${{ github.ref_name }}-net10.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
